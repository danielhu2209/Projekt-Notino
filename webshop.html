<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Essence - Kollekciók & Webshop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      /* --- KÖZÖS CSS --- */
      :root {
        --color-bg: #f9f7f2;
        --color-text: black;
        --color-gold: #d4af37;
        --font-heading: "Playfair Display", serif;
        --font-body: "Lato", sans-serif;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: var(--font-body);
        background-color: var(--color-bg);
        color: var(--color-text);
        line-height: 1.6;
        font-weight: 300;
      }

      h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 400; }
      a { text-decoration: none; color: inherit; transition: all 0.3s ease; }
      ul { list-style: none; }

      .btn {
        display: inline-block;
        padding: 10px 25px;
        border: 1px solid var(--color-text);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.3s ease;
        background: transparent;
      }
      .btn:hover { background-color: var(--color-text); color: var(--color-bg); }
      .btn-gold { border-color: var(--color-gold); color: var(--color-gold); background: transparent; }
      .btn-gold:hover { background-color: var(--color-gold); color: #fff; }

      /* --- NAVIGÁCIÓ & KOSÁR IKON --- */
      header {
        padding: 20px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        background-color: rgba(249, 247, 242, 0.98);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }
      .logo { font-family: var(--font-heading); font-size: 1.8rem; letter-spacing: 2px; font-weight: 600; }
      nav ul { display: flex; gap: 30px; align-items: center; }
      nav a { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
      nav a:hover { color: var(--color-gold); }

      .cart-icon-container {
        position: relative;
        cursor: pointer;
        font-size: 1.2rem;
        margin-left: 20px;
      }
      .cart-badge {
        position: absolute;
        top: -8px;
        right: -10px;
        background-color: var(--color-gold);
        color: white;
        font-size: 0.7rem;
        border-radius: 50%;
        padding: 2px 6px;
        font-weight: bold;
      }
      
      .auth-link { font-weight: 700; color: var(--color-gold); }

      /* --- WEBSHOP ELRENDEZÉS --- */
      .page-header { margin-top: 100px; padding: 60px 20px 40px; text-align: center; }
      .page-header h1 { font-size: 3rem; margin-bottom: 10px; }
      .shop-container { display: flex; max-width: 1400px; margin: 0 auto; padding: 0 50px 80px; gap: 50px; }

      /* --- SZŰRŐK --- */
      .filters { flex: 0 0 250px; }
      .filter-group { margin-bottom: 40px; }
      .filter-group h4 { font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
      .search-box { width: 100%; padding: 10px; border: 1px solid #ccc; background: transparent; outline: none; }
      .filter-label { display: block; margin-bottom: 10px; cursor: pointer; }

      /* --- TERMÉK RÁCS --- */
      .products-area { flex: 1; }
      .products-header { display: flex; justify-content: space-between; margin-bottom: 30px; }
      .sort-select { padding: 8px; border: 1px solid #ccc; background: transparent; outline: none; }
      .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
      .collection-card { text-align: center; transition: transform 0.3s ease; }
      .collection-card:hover { transform: translateY(-5px); }
      .img-container { height: 350px; overflow: hidden; margin-bottom: 15px; background-color: #fff; }
      .img-container img { width: 100%; height: 100%; object-fit: cover; }
      .collection-card h3 { font-size: 1.3rem; margin-bottom: 5px; }
      .price { font-size: 1.1rem; margin-bottom: 5px; }
      .notes { font-size: 0.85rem; color: #888; font-style: italic; margin-bottom: 10px; }
      .stock-status { font-size: 0.85rem; margin-bottom: 15px; }
      .in-stock { color: #2e7d32; }
      .out-of-stock { color: #c62828; }
      .btn-cart { width: 100%; }
      .btn-disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }

      /* --- KOSÁR OLDALSÁV (SLIDE-IN) --- */
      .cart-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.5); z-index: 1001; display: none; opacity: 0; transition: opacity 0.3s;
      }
      .cart-overlay.active { display: block; opacity: 1; }

      .cart-sidebar {
        position: fixed; top: 0; right: -450px; width: 400px; max-width: 100%; height: 100%;
        background-color: var(--color-bg); z-index: 1002; box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
        transition: right 0.4s ease; display: flex; flex-direction: column;
      }
      .cart-sidebar.open { right: 0; }
      .cart-header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
      .cart-header h2 { font-size: 1.5rem; }
      .close-cart { font-size: 1.5rem; cursor: pointer; }
      .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
      .cart-item { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
      .cart-item img { width: 80px; height: 80px; object-fit: cover; }
      .cart-item-info { flex: 1; }
      .cart-item-info h4 { font-size: 1rem; margin-bottom: 5px; }
      .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
      .qty-btn { background: #ddd; border: none; width: 25px; height: 25px; cursor: pointer; font-weight: bold; }
      .qty-btn:hover { background: #ccc; }
      .cart-footer { padding: 20px; border-top: 1px solid #ddd; background: #fff; }
      .cart-total { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; }
      .btn-checkout { width: 100%; background-color: var(--color-text); color: var(--color-bg); text-align: center; }
      .btn-checkout:hover { background-color: #333; }

      footer { background-color: #1a1a1a; color: #888; padding: 40px 20px; text-align: center; font-size: 0.8rem; }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">L'ESSENCE</div>
      <nav>
        <ul>
          <li><a href="index.html">Főoldal</a></li>
          <li><a href="bemutatkozas.html">Rólunk</a></li>
          <li><a href="webshop.html" style="color: var(--color-gold)">Kollekciók</a></li>
          <li><a href="elerhetoseg.html">Kapcsolat</a></li>
          <li><a href="login.html" id="auth-link" class="auth-link">Bejelentkezés</a></li>
          <li class="cart-icon-container" onclick="toggleCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cart-badge">0</span>
          </li>
        </ul>
      </nav>
    </header>

    <div class="page-header">
      <h1>Boutique</h1>
      <p>Fedezze fel exkluzív illatainkat</p>
    </div>

    <main class="shop-container">
      <aside class="filters">
        <div class="filter-group">
          <h4>Keresés</h4>
          <input type="text" id="search-input" class="search-box" placeholder="Parfüm neve alapján..." />
        </div>
        <div class="filter-group">
          <h4>Illatjegyek</h4>
          <label class="filter-label"><input type="checkbox" value="virágos" /> Virágos</label>
          <label class="filter-label"><input type="checkbox" value="fás" /> Fás</label>
          <label class="filter-label"><input type="checkbox" value="orientális" /> Orientális</label>
          <label class="filter-label"><input type="checkbox" value="citrusos" /> Citrusos</label>
          <label class="filter-label"><input type="checkbox" value="fűszeres" /> Fűszeres</label>
          <label class="filter-label"><input type="checkbox" value="édes" /> Édes</label>
          <label class="filter-label"><input type="checkbox" value="bőr" /> Bőr</label>
        </div>
      </aside>

      <section class="products-area">
        <div class="products-header">
          <span><strong id="product-count">0</strong> termék található</span>
          <select id="sort-select" class="sort-select">
            <option value="default">Alapértelmezett sorrend</option>
            <option value="price-asc">Ár: Alacsonytól Magasig</option>
            <option value="price-desc">Ár: Magastól Alacsonyig</option>
          </select>
        </div>
        <div class="collection-grid" id="product-grid"></div>
      </section>
    </main>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
      <div class="cart-header">
        <h2>Kosaram</h2>
        <i class="fas fa-times close-cart" onclick="toggleCart()"></i>
      </div>
      <div class="cart-items" id="cart-items-container"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Összesen:</span>
          <span id="cart-total-price">0 Ft</span>
        </div>
        <button class="btn btn-checkout" onclick="checkout()">
          Fizetés és Megrendelés
        </button>
      </div>
    </div>

    <footer>
      <p>&copy; 2024 L'Essence Parfüméria. Minden jog fenntartva.</p>
    </footer>
    <script src="webshop.js"></script>
  </body>
</html>
